services:
  postgres_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - microservices_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "-v"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: node:20-alpine
    container_name: api-gateway
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm start:dev"
    ports:
      - "3000:3000"
    depends_on:
      postgres_db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NATS_URL=nats://nats:4222
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    networks:
      - microservices_net
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  orders-service:
    image: node:20-alpine
    container_name: orders-service
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm start:dev --filter=orders-service"
    ports:
      - "3001:3001"
    depends_on:
      postgres_db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3001
      - NATS_URL=nats://nats:4222
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    networks:
      - microservices_net
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  products-service:
    image: node:20-alpine
    container_name: products-service
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm start:dev --filter=products-service"
    ports:
      - "3002:3002"
    depends_on:
      postgres_db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3002
      - NATS_URL=nats://nats:4222
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    networks:
      - microservices_net
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  inventory-service:
    image: node:20-alpine
    container_name: inventory-service
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm start:dev --filter=inventory-service"
    ports:
      - "3003:3003"
    depends_on:
      postgres_db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3003
      - NATS_URL=nats://nats:4222
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    networks:
      - microservices_net
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  payments-service:
    image: node:20-alpine
    container_name: payments-service
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm start:dev --filter=payments-service"
    ports:
      - "3004:3004"
    depends_on:
      postgres_db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3004
      - NATS_URL=nats://nats:4222
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=ecommerce_dev
    networks:
      - microservices_net
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  microservices_net:
    driver: bridge

volumes:
  postgres_data:
  nats_data: