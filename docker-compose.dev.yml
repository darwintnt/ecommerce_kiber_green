services:
  postgres_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=ecommerce_pass
      - POSTGRES_DB=ecommerce_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    container_name: nats
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # HTTP monitoring
      - "6222:6222" # cluster routing (opcional)
    command: >
      -js -m 8222 -n nats-server
    volumes:
      - nats_data:/data
    networks:
      - microservices_net
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/4222 && echo ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  microservices_net:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
